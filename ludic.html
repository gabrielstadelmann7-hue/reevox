<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reevox Learn - Apprendre en jouant</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #000814, #001845); }
        h1, h2, h3, .orbitron { font-family: 'Orbitron', sans-serif; }
        .game-card { transition: all 0.3s; cursor: pointer; }
        .game-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(59,130,246,0.3); }
        .answer-btn { transition: all 0.2s; }
        .answer-btn:hover { transform: scale(1.03); }
        .answer-btn.correct { background: linear-gradient(135deg, #16a34a, #15803d) !important; border-color: #22c55e !important; }
        .answer-btn.wrong   { background: linear-gradient(135deg, #dc2626, #b91c1c) !important; border-color: #ef4444 !important; }
        .progress-bar { transition: width 0.5s ease; }
        @keyframes popIn  { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .pop-in  { animation: popIn  0.4s ease forwards; }
        .fade-up { animation: fadeUp 0.5s ease forwards; }
        .timer-ring { transition: stroke-dashoffset 1s linear; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- HEADER -->
    <header class="backdrop-blur-xl bg-black/70 border-b border-blue-500/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="backdrop-blur-lg bg-white/5 border border-blue-400/30 px-4 py-2 rounded-xl text-blue-400 hover:bg-white/10 transition-all">← Retour</a>
                <img src="IMG_7957.png" class="h-10" alt="Reevox" onerror="this.style.display='none'">
                <span class="orbitron text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">LEARN</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="text-blue-400 font-semibold"></span>
                <span id="totalScore" class="bg-yellow-500/20 border border-yellow-500 px-4 py-2 rounded-full text-yellow-400 font-bold text-sm">⭐ 0 pts</span>
            </div>
        </div>
    </header>

    <!-- PAGE PRINCIPALE -->
    <div id="mainPage">
        <main class="max-w-7xl mx-auto px-6 py-12">
            <div class="text-center mb-12 fade-up">
                <h1 class="orbitron text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">🎓 Reevox Learn</h1>
                <p class="text-xl text-gray-300">Teste tes connaissances dans des dizaines de catégories</p>
            </div>

            <!-- SÉLECTION ÂGE -->
            <div class="max-w-4xl mx-auto mb-10">
                <div class="backdrop-blur-xl bg-gradient-to-br from-blue-500/10 to-purple-500/10 border border-blue-500/30 rounded-3xl p-8">
                    <h2 class="orbitron text-xl font-bold text-blue-400 mb-6 text-center">👶 Sélectionne ton niveau</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <button onclick="selectAge('3-5')"   class="age-btn bg-pink-500/20   border-2 border-pink-500/50   hover:bg-pink-500/40   py-4 rounded-xl font-bold text-lg transition-all">3-5 ans</button>
                        <button onclick="selectAge('6-8')"   class="age-btn bg-orange-500/20 border-2 border-orange-500/50 hover:bg-orange-500/40 py-4 rounded-xl font-bold text-lg transition-all">6-8 ans</button>
                        <button onclick="selectAge('9-12')"  class="age-btn bg-blue-500/20   border-2 border-blue-500/50   hover:bg-blue-500/40   py-4 rounded-xl font-bold text-lg transition-all">9-12 ans</button>
                        <button onclick="selectAge('13-18')" class="age-btn bg-purple-500/20 border-2 border-purple-500/50 hover:bg-purple-500/40 py-4 rounded-xl font-bold text-lg transition-all">13-18 ans</button>
                    </div>
                    <p id="ageDisplay" class="text-center text-gray-400 text-sm mt-4">Choisis ton niveau pour voir les jeux adaptés</p>
                </div>
            </div>

            <!-- FILTRES CATÉGORIES -->
            <div class="mb-8 flex flex-wrap gap-3 justify-center">
                <button onclick="filterCat('all')"      class="cat-btn active-cat px-5 py-2 rounded-full font-semibold text-sm transition-all border">Tous</button>
                <button onclick="filterCat('math')"     class="cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10">🔢 Maths</button>
                <button onclick="filterCat('language')" class="cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10">📚 Français</button>
                <button onclick="filterCat('science')"  class="cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10">🔬 Sciences</button>
                <button onclick="filterCat('history')"  class="cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10">🏛️ Histoire</button>
                <button onclick="filterCat('geo')"      class="cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10">🌍 Géo</button>
                <button onclick="filterCat('logic')"    class="cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10">🧩 Logique</button>
                <button onclick="filterCat('memory')"   class="cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10">🧠 Mémoire</button>
            </div>

            <div id="gamesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
            <div id="noGamesMsg" class="text-center py-20 text-gray-400 text-xl">Choisis ton niveau pour voir les jeux ! 🎮</div>
        </main>
    </div>

    <!-- PAGE DE JEU -->
    <div id="gamePage" class="hidden">
        <div class="max-w-4xl mx-auto px-6 py-8">
            <!-- Top bar -->
            <div class="flex items-center justify-between mb-6">
                <button onclick="exitGame()" class="bg-white/10 border border-white/20 px-4 py-2 rounded-xl hover:bg-white/20 transition-all">← Quitter</button>
                <div id="gameNameDisplay" class="orbitron text-xl font-bold text-blue-400"></div>
                <div class="flex items-center gap-3">
                    <span class="text-yellow-400 font-bold">Score: <span id="liveScore">0</span></span>
                    <span class="bg-blue-500/20 border border-blue-500 px-3 py-1 rounded-full text-sm"><span id="qNum">1</span>/<span id="qTotal">10</span></span>
                </div>
            </div>

            <!-- Barre de progression -->
            <div class="bg-white/10 rounded-full h-2 mb-6 overflow-hidden">
                <div id="progressBar" class="progress-bar h-full bg-gradient-to-r from-blue-500 to-purple-500 rounded-full" style="width:0%"></div>
            </div>

            <!-- Carte de question -->
            <div id="questionCard" class="backdrop-blur-xl bg-gradient-to-br from-blue-900/30 to-purple-900/30 border border-blue-500/30 rounded-3xl p-8 mb-6 fade-up">
                <!-- Contenu injecté ici -->
            </div>

            <!-- Feedback -->
            <div id="feedback" class="hidden text-center py-4 rounded-2xl mb-4 text-xl font-bold"></div>

            <!-- Résultats finaux -->
            <div id="resultsPanel" class="hidden backdrop-blur-xl bg-gradient-to-br from-green-900/30 to-emerald-900/30 border border-green-500/30 rounded-3xl p-8 text-center pop-in">
                <div class="text-7xl mb-4" id="resultEmoji">🎉</div>
                <h3 class="orbitron text-3xl font-bold mb-2" id="resultTitle"></h3>
                <p class="text-gray-300 mb-6" id="resultSubtitle"></p>
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="bg-white/10 rounded-xl p-4"><div class="text-3xl font-bold text-yellow-400" id="finalScore">0</div><div class="text-xs text-gray-400 mt-1">Points gagnés</div></div>
                    <div class="bg-white/10 rounded-xl p-4"><div class="text-3xl font-bold text-green-400" id="correctCount">0</div><div class="text-xs text-gray-400 mt-1">Bonnes réponses</div></div>
                    <div class="bg-white/10 rounded-xl p-4"><div class="text-3xl font-bold text-blue-400" id="accuracyPct">0%</div><div class="text-xs text-gray-400 mt-1">Précision</div></div>
                </div>
                <div class="flex gap-4 justify-center">
                    <button onclick="restartCurrentGame()" class="bg-gradient-to-r from-blue-600 to-purple-600 px-8 py-3 rounded-xl font-bold hover:shadow-lg hover:shadow-blue-500/50 transition-all">🔄 Rejouer</button>
                    <button onclick="exitGame()" class="bg-white/10 border border-white/20 px-8 py-3 rounded-xl font-bold hover:bg-white/20 transition-all">← Retour</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JEUX DE MÉMOIRE (canvas) -->
    <div id="memoryPage" class="hidden">
        <div class="max-w-5xl mx-auto px-6 py-8">
            <div class="flex items-center justify-between mb-6">
                <button onclick="exitGame()" class="bg-white/10 border border-white/20 px-4 py-2 rounded-xl hover:bg-white/20 transition-all">← Quitter</button>
                <div id="memGameName" class="orbitron text-xl font-bold text-yellow-400"></div>
                <span class="text-yellow-400 font-bold">Score: <span id="memScore">0</span></span>
            </div>
            <div id="memoryContainer"></div>
        </div>
    </div>

function show(id) { ['mainPage','gamePage','memoryPage'].forEach(p => document.getElementById(p).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

window.selectAge = function(age) {
    currentAge = age;
    document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('ring-4','ring-blue-400'));
    event.target.classList.add('ring-4','ring-blue-400');
    const labels = {'3-5':'Maternelle 🌸','6-8':'Primaire 🌟','9-12':'Collège 🚀','13-18':'Lycée 🎓'};
    document.getElementById('ageDisplay').textContent = '✅ ' + labels[age];
    displayGames();
};

window.filterCat = function(cat) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => { b.className = 'cat-btn px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-white/5 border-white/20 hover:bg-white/10'; });
    event.target.className = 'cat-btn active-cat px-5 py-2 rounded-full font-semibold text-sm transition-all border bg-blue-500/20 border-blue-500 text-blue-300 font-bold';
    displayGames();
};

function displayGames() {
    const grid  = document.getElementById('gamesGrid');
    const noMsg = document.getElementById('noGamesMsg');
    if (!currentAge) { grid.innerHTML=''; noMsg.classList.remove('hidden'); return; }
    noMsg.classList.add('hidden');

    let games = GAMES_CATALOG[currentAge] || [];
    if (currentCat !== 'all') games = games.filter(g => g.cat === currentCat);
    if (!games.length) { grid.innerHTML='<p class="col-span-4 text-center text-gray-400 py-10">Aucun jeu dans cette catégorie pour cet âge.</p>'; return; }

    const catNames = {math:'🔢 Maths',language:'📚 Français',science:'🔬 Sciences',history:'🏛️ Histoire',geo:'🌍 Géo',logic:'🧩 Logique',memory:'🧠 Mémoire'};
    grid.innerHTML = games.map((g,i) => `
        <div class="game-card backdrop-blur-xl bg-gradient-to-br ${g.color} border-2 rounded-3xl p-6" onclick="launchGame('${g.id}')" style="animation:fadeUp 0.4s ease ${i*0.07}s both">
            <div class="text-5xl mb-3 text-center">${g.emoji}</div>
            <h3 class="text-lg font-bold mb-1 text-center">${g.name}</h3>
            <p class="text-xs text-gray-400 mb-3 text-center">${g.desc}</p>
            <div class="flex justify-between items-center">
                <span class="text-xs bg-white/10 px-2 py-1 rounded-full">${catNames[g.cat]}</span>
                <span class="text-yellow-400 text-sm">${'⭐'.repeat(g.diff)}</span>
            </div>
        </div>
    `).join('');
}

// ════════════════════════════════════════════════════════════
// LANCEMENT D'UN JEU
// ════════════════════════════════════════════════════════════

window.launchGame = function(gameId) {
    currentGameId = gameId;

    if (gameId.startsWith('memory')) {
        launchMemoryGame(gameId);
        return;
    }

    const bank = QUESTION_BANKS[gameId];
    if (!bank) { alert('Jeu bientôt disponible !'); return; }

    // Mélanger et prendre 12 questions
    questions = [...bank].sort(() => Math.random() - 0.5).slice(0, 12);
    // Mélanger les réponses de chaque question
    questions = questions.map(q => {
        const indexed = q.a.map((ans, i) => ({ans, correct: i === q.c}));
        const shuffled = indexed.sort(() => Math.random() - 0.5);
        return { q: q.q, a: shuffled.map(x => x.ans), c: shuffled.findIndex(x => x.correct) };
    });

    qIndex = 0; score = 0; correctAnswers = 0; answered = false;

    const catNames = ['3-5','6-8','9-12','13-18'];
    const allGames = catNames.flatMap(a => GAMES_CATALOG[a] || []);
    const gameInfo = allGames.find(g => g.id === gameId);
    document.getElementById('gameNameDisplay').textContent = (gameInfo?.emoji || '🎮') + ' ' + (gameInfo?.name || gameId);
    document.getElementById('qTotal').textContent = questions.length;

    show('gamePage');
    document.getElementById('resultsPanel').classList.add('hidden');
    renderQuestion();
};

function renderQuestion() {
    if (qIndex >= questions.length) { showResults(); return; }
    answered = false;
    clearInterval(timerInterval);

    const q    = questions[qIndex];
    const pct  = Math.round((qIndex / questions.length) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('qNum').textContent   = qIndex + 1;
    document.getElementById('liveScore').textContent = score;
    document.getElementById('feedback').classList.add('hidden');
    timeLeft = 15;

    document.getElementById('questionCard').innerHTML = `
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs text-gray-400">Question ${qIndex+1}/${questions.length}</span>
                <span id="timerDisplay" class="text-sm font-bold text-yellow-400">⏱ ${timeLeft}s</span>
            </div>
            <h3 class="text-xl font-bold text-white leading-relaxed">${q.q}</h3>
        </div>
        <div class="grid grid-cols-1 gap-3" id="answersGrid">
            ${q.a.map((ans, i) => `
                <button id="ans-${i}" class="answer-btn text-left bg-white/5 border-2 border-white/20 rounded-xl px-5 py-4 font-semibold hover:bg-white/10 hover:border-blue-400 transition-all"
                    onclick="submitAnswer(${i})">
                    <span class="text-blue-400 font-bold mr-3">${['A','B','C','D'][i]}.</span>${ans}
                </button>
            `).join('')}
        </div>
    `;

    // Timer
    timerInterval = setInterval(() => {
        timeLeft--;
        const el = document.getElementById('timerDisplay');
        if (el) { el.textContent = `⏱ ${timeLeft}s`; el.className = timeLeft <= 5 ? 'text-sm font-bold text-red-400' : 'text-sm font-bold text-yellow-400'; }
        if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) submitAnswer(-1); }
    }, 1000);
}

window.submitAnswer = function(idx) {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);

    const q       = questions[qIndex];
    const correct = q.c;
    const isRight = idx === correct;
    const pts     = isRight ? Math.max(10, timeLeft * 5) : 0;

    // Colorier les boutons
    for (let i = 0; i < q.a.length; i++) {
        const btn = document.getElementById('ans-' + i);
        if (!btn) continue;
        btn.disabled = true;
        if (i === correct)     btn.classList.add('correct');
        else if (i === idx)    btn.classList.add('wrong');
    }

    if (isRight) {
        score += pts;
        correctAnswers++;
        showFeedback('✅ Correct ! +' + pts + ' pts', 'bg-green-500/20 text-green-400 border border-green-500/30');
    } else {
        showFeedback(idx === -1 ? '⏰ Temps écoulé !' : '❌ Mauvaise réponse — la bonne était : ' + q.a[correct], 'bg-red-500/20 text-red-400 border border-red-500/30');
    }

    document.getElementById('liveScore').textContent = score;
    setTimeout(() => { qIndex++; renderQuestion(); }, 1400);
};

function showFeedback(msg, cls) {
    const el = document.getElementById('feedback');
    el.className = 'text-center py-3 rounded-xl mb-2 text-base font-semibold ' + cls;
    el.textContent = msg;
    el.classList.remove('hidden');
}

function showResults() {
    clearInterval(timerInterval);
    document.getElementById('questionCard').classList.add('hidden');
    document.getElementById('feedback').classList.add('hidden');

    const acc   = Math.round((correctAnswers / questions.length) * 100);
    const emoji = acc >= 90 ? '🏆' : acc >= 70 ? '🎉' : acc >= 50 ? '👍' : '💪';
    const title = acc >= 90 ? 'Excellent !' : acc >= 70 ? 'Très bien !' : acc >= 50 ? 'Pas mal !' : 'Continue à t\'entraîner !';

    document.getElementById('resultEmoji').textContent    = emoji;
    document.getElementById('resultTitle').textContent    = title;
    document.getElementById('resultSubtitle').textContent = `${correctAnswers}/${questions.length} bonnes réponses`;
    document.getElementById('finalScore').textContent     = score;
    document.getElementById('correctCount').textContent   = correctAnswers;
    document.getElementById('accuracyPct').textContent    = acc + '%';

    totalPoints += score;
    localStorage.setItem('reevox_learn_pts', totalPoints);
    document.getElementById('totalScore').textContent = '⭐ ' + totalPoints + ' pts';

    document.getElementById('resultsPanel').classList.remove('hidden');
    document.getElementById('resultsPanel').classList.add('pop-in');
}

window.restartCurrentGame = function() {
    document.getElementById('questionCard').classList.remove('hidden');
    document.getElementById('resultsPanel').classList.add('hidden');
    launchGame(currentGameId);
};

window.exitGame = function() {
    clearInterval(timerInterval);
    document.getElementById('questionCard').classList.remove('hidden');
    show('mainPage');
    displayGames();
};

// ════════════════════════════════════════════════════════════
// JEU DE MÉMOIRE
// ════════════════════════════════════════════════════════════

const MEMORY_SETS = {
    'memory-3-5':  {pairs:6,  items:['🐶','🐱','🐭','🐰','🦊','🐻']},
    'memory-6-8':  {pairs:8,  items:['🌍','🌙','⭐','☀️','🌊','🏔️','🌈','⚡']},
    'memory-9-12': {pairs:10, items:['🎸','🎹','🎺','🎻','🥁','🎷','🪗','🎵','🎶','🎼']},
    'memory-13-18':{pairs:12, items:['⚛️','🧬','🔬','⚗️','🧪','🔭','💡','🔋','🧲','📡','💻','🛰️']},
};

function launchMemoryGame(gameId) {
    const cfg = MEMORY_SETS[gameId] || MEMORY_SETS['memory-3-5'];
    const catNames = ['3-5','6-8','9-12','13-18'];
    const allGames = catNames.flatMap(a => GAMES_CATALOG[a] || []);
    const gameInfo = allGames.find(g => g.id === gameId);

    document.getElementById('memGameName').textContent = (gameInfo?.emoji || '🧠') + ' ' + (gameInfo?.name || 'Mémoire');
    document.getElementById('memScore').textContent = '0';

    show('memoryPage');

    const items = [...cfg.items.slice(0, cfg.pairs), ...cfg.items.slice(0, cfg.pairs)].sort(() => Math.random() - 0.5);
    let flipped = [], matched = 0, memScore = 0, locked = false;
    const cols = cfg.pairs <= 6 ? 4 : cfg.pairs <= 10 ? 5 : 6;

    document.getElementById('memoryContainer').innerHTML = `
        <p class="text-center text-gray-400 mb-4 text-sm">Retrouve les ${cfg.pairs} paires 🃏</p>
        <div class="grid gap-3 max-w-3xl mx-auto" style="grid-template-columns:repeat(${cols},1fr)">
            ${items.map((item, i) => `
                <div id="mc-${i}" data-item="${item}" data-idx="${i}"
                     class="mem-card aspect-square rounded-xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center text-3xl cursor-pointer hover:scale-105 transition-all select-none border-2 border-transparent"
                     onclick="flipMem(${i})">
                    <span class="front text-3xl">?</span>
                    <span class="back hidden text-3xl">${item}</span>
                </div>
            `).join('')}
        </div>
        <div id="memWin" class="hidden text-center mt-8 pop-in">
            <div class="text-7xl mb-3">🎉</div>
            <h3 class="orbitron text-2xl font-bold text-yellow-400 mb-2">Bravo !</h3>
            <p class="text-gray-300 mb-4">Tu as trouvé toutes les paires !</p>
            <div class="flex gap-4 justify-center">
                <button onclick="launchMemoryGame('${gameId}')" class="bg-gradient-to-r from-blue-600 to-purple-600 px-6 py-3 rounded-xl font-bold">🔄 Rejouer</button>
                <button onclick="exitGame()" class="bg-white/10 border border-white/20 px-6 py-3 rounded-xl font-bold">← Retour</button>
            </div>
        </div>
    `;

    window.flipMem = function(idx) {
        if (locked) return;
        const card = document.getElementById('mc-' + idx);
        if (!card || card.classList.contains('matched') || flipped.find(f => f.idx === idx)) return;

        card.querySelector('.front').classList.add('hidden');
        card.querySelector('.back').classList.remove('hidden');
        card.classList.add('border-blue-400');
        flipped.push({ idx, item: card.dataset.item, el: card });

        if (flipped.length === 2) {
            locked = true;
            setTimeout(() => {
                if (flipped[0].item === flipped[1].item) {
                    flipped.forEach(f => { f.el.classList.add('matched','opacity-60','cursor-default'); f.el.classList.remove('border-blue-400'); f.el.classList.add('border-green-400'); });
                    matched++;
                    memScore += 10;
                    document.getElementById('memScore').textContent = memScore;
                    if (matched === cfg.pairs) {
                        totalPoints += memScore;
                        localStorage.setItem('reevox_learn_pts', totalPoints);
                        document.getElementById('totalScore').textContent = '⭐ ' + totalPoints + ' pts';
                        document.getElementById('memWin').classList.remove('hidden');
                    }
                } else {
                    flipped.forEach(f => {
                        f.el.querySelector('.front').classList.remove('hidden');
                        f.el.querySelector('.back').classList.add('hidden');
                        f.el.classList.remove('border-blue-400');
                    });
                }
                flipped = [];
                locked  = false;
            }, 900);
        }
    };
}
