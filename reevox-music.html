<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reevox Music - Streaming</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a0033 0%, #2d0f4d 25%, #0f1a33 50%, #1a2d4d 75%, #0d1f33 100%);
            background-size: 400% 400%;
            animation: musicFlow 15s ease infinite;
        }
        
        @keyframes musicFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .glass-music {
            background: rgba(20, 10, 40, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        
        .player-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .track-card {
            transition: all 0.3s;
        }
        
        .track-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.4);
        }
        
        .wave {
            animation: wave 1s linear infinite;
        }
        
        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }
        
        .progress-bar {
            cursor: pointer;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #a855f7;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="text-white min-h-screen pb-32">

    <header class="glass-music sticky top-0 z-50 border-b border-purple-500/30">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="glass-music px-4 py-2 rounded-xl hover:bg-purple-500/20 transition-all font-bold">
                        ← Retour
                    </a>
                    <img src="IMG_7957.png" class="h-10" alt="Reevox">
                    <div>
                        <h1 class="text-2xl font-black bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                            REEVOX MUSIC
                        </h1>
                        <p class="text-xs text-purple-300">Streaming Platform</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <input type="text" id="searchInput" placeholder="Rechercher une musique..." class="glass-music px-4 py-2 rounded-xl border border-purple-500/30 focus:outline-none focus:border-purple-500 w-64">
                    <button onclick="openUploadModal()" class="bg-gradient-to-r from-purple-600 to-pink-600 px-6 py-2 rounded-xl font-bold hover:shadow-lg hover:shadow-purple-500/50 transition-all">
                        + Upload
                    </button>
                    <div class="text-right">
                        <p id="userDisplay" class="font-bold text-purple-300"></p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">

        <!-- Navigation Tabs -->
        <div class="flex gap-4 mb-8">
            <button onclick="showTab('discover')" id="tabDiscover" class="px-6 py-3 rounded-xl font-bold bg-gradient-to-r from-purple-600 to-pink-600">
                🎵 Découvrir
            </button>
            <button onclick="showTab('playlists')" id="tabPlaylists" class="px-6 py-3 rounded-xl font-bold glass-music hover:bg-purple-500/20">
                📚 Playlists
            </button>
            <button onclick="showTab('library')" id="tabLibrary" class="px-6 py-3 rounded-xl font-bold glass-music hover:bg-purple-500/20">
                💿 Ma Bibliothèque
            </button>
        </div>

        <!-- DÉCOUVRIR -->
        <div id="discoverTab">
            <h2 class="text-3xl font-black mb-6 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                🔥 Tendances
            </h2>
            <div id="tracksContainer" class="grid md:grid-cols-3 lg:grid-cols-4 gap-6 mb-12">
                <!-- Musiques ici -->
            </div>

            <h2 class="text-3xl font-black mb-6 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                🎧 Playlists Populaires
            </h2>
            <div id="popularPlaylists" class="grid md:grid-cols-3 gap-6">
                <!-- Playlists populaires -->
            </div>
        </div>

        <!-- PLAYLISTS -->
        <div id="playlistsTab" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-black bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    📚 Mes Playlists
                </h2>
                <button onclick="createPlaylist()" class="bg-gradient-to-r from-purple-600 to-pink-600 px-6 py-3 rounded-xl font-bold">
                    + Nouvelle Playlist
                </button>
            </div>
            <div id="myPlaylists" class="grid md:grid-cols-3 gap-6">
                <!-- Mes playlists -->
            </div>
        </div>

        <!-- MA BIBLIOTHÈQUE -->
        <div id="libraryTab" class="hidden">
            <h2 class="text-3xl font-black mb-6 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                💿 Mes Musiques Uploadées
            </h2>
            <div id="myTracks" class="grid md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Mes musiques -->
            </div>
        </div>

    </main>

    <!-- PLAYER FLOTTANT -->
    <div id="musicPlayer" class="player-fixed glass-music border-t border-purple-500/30 hidden">
        <div class="max-w-7xl mx-auto px-6 py-4">
            
            <!-- Barre de progression -->
            <div class="mb-4">
                <div class="flex items-center gap-4 text-xs mb-2">
                    <span id="currentTime" class="text-purple-300">0:00</span>
                    <div class="flex-1 bg-purple-900/30 rounded-full h-2 progress-bar" onclick="seekTo(event)">
                        <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-full rounded-full transition-all" style="width: 0%"></div>
                    </div>
                    <span id="duration" class="text-purple-300">0:00</span>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <!-- Info musique -->
                <div class="flex items-center gap-4 flex-1">
                    <img id="playerCover" src="" class="w-16 h-16 rounded-lg" onerror="this.src='https://via.placeholder.com/150/a855f7/ffffff?text=♪'">
                    <div>
                        <h4 id="playerTitle" class="font-bold text-lg">Aucune musique</h4>
                        <p id="playerArtist" class="text-sm text-purple-300">-</p>
                    </div>
                </div>

                <!-- Contrôles -->
                <div class="flex items-center gap-6">
                    <button onclick="toggleShuffle()" id="shuffleBtn" class="text-purple-300 hover:text-white transition-all">
                        🔀
                    </button>
                    <button onclick="previousTrack()" class="text-3xl hover:scale-110 transition-all">
                        ⏮️
                    </button>
                    <button onclick="togglePlay()" id="playBtn" class="bg-gradient-to-r from-purple-600 to-pink-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl hover:scale-110 transition-all">
                        ▶️
                    </button>
                    <button onclick="nextTrack()" class="text-3xl hover:scale-110 transition-all">
                        ⏭️
                    </button>
                    <button onclick="toggleRepeat()" id="repeatBtn" class="text-purple-300 hover:text-white transition-all">
                        🔁
                    </button>
                </div>

                <!-- Volume -->
                <div class="flex items-center gap-4 flex-1 justify-end">
                    <button onclick="toggleMute()" id="muteBtn" class="text-2xl">🔊</button>
                    <input type="range" min="0" max="100" value="70" id="volumeSlider" onchange="changeVolume()" class="volume-slider w-32">
                    <button onclick="openQueue()" class="glass-music px-4 py-2 rounded-lg hover:bg-purple-500/20">
                        📝 Queue (<span id="queueCount">0</span>)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio element -->
    <audio id="audioPlayer"></audio>

    <!-- MODAL UPLOAD -->
    <div id="uploadModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="glass-music rounded-3xl p-8 max-w-2xl w-full">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-black bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    🎵 Upload une musique
                </h2>
                <button onclick="closeUploadModal()" class="text-purple-300 hover:text-white text-2xl">✕</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-purple-300 font-bold mb-2">Titre de la musique</label>
                    <input type="text" id="trackTitle" class="w-full glass-music px-4 py-3 rounded-xl border border-purple-500/30 focus:outline-none focus:border-purple-500">
                </div>

                <div>
                    <label class="block text-purple-300 font-bold mb-2">Artiste</label>
                    <input type="text" id="trackArtist" class="w-full glass-music px-4 py-3 rounded-xl border border-purple-500/30 focus:outline-none focus:border-purple-500">
                </div>

                <div>
                    <label class="block text-purple-300 font-bold mb-2">Lien de la musique (URL mp3/audio)</label>
                    <input type="url" id="trackURL" placeholder="https://example.com/music.mp3" class="w-full glass-music px-4 py-3 rounded-xl border border-purple-500/30 focus:outline-none focus:border-purple-500">
                    <p class="text-xs text-purple-400 mt-1">💡 Utilise un lien Dropbox, Google Drive ou autre hébergeur</p>
                </div>

                <div>
                    <label class="block text-purple-300 font-bold mb-2">Image de couverture (URL)</label>
                    <input type="url" id="trackCover" placeholder="https://example.com/cover.jpg" class="w-full glass-music px-4 py-3 rounded-xl border border-purple-500/30 focus:outline-none focus:border-purple-500">
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="closeUploadModal()" class="flex-1 glass-music px-6 py-3 rounded-xl font-bold hover:bg-purple-500/20">
                        Annuler
                    </button>
                    <button onclick="uploadTrack()" class="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 px-6 py-3 rounded-xl font-bold">
                        ✨ Upload
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL QUEUE -->
    <div id="queueModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="glass-music rounded-3xl p-8 max-w-2xl w-full max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-black bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    📝 File d'attente
                </h2>
                <button onclick="closeQueue()" class="text-purple-300 hover:text-white text-2xl">✕</button>
            </div>

            <div id="queueList" class="space-y-3">
                <!-- Queue ici -->
            </div>
        </div>
    </div>

    <!-- MODAL PLAYLIST -->
    <div id="playlistModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="glass-music rounded-3xl p-8 max-w-3xl w-full max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 id="playlistModalTitle" class="text-3xl font-black bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                        Ma Playlist
                    </h2>
                    <p id="playlistModalCount" class="text-sm text-purple-300 mt-1">0 musiques</p>
                </div>
                <button onclick="closePlaylistModal()" class="text-purple-300 hover:text-white text-2xl">✕</button>
            </div>

            <button onclick="playPlaylist()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 px-6 py-4 rounded-xl font-bold text-lg mb-6 hover:scale-105 transition-all">
                ▶️ Jouer la playlist
            </button>

            <div id="playlistTracks" class="space-y-3">
                <!-- Tracks de la playlist -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, push, get, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC0kJQP62qnj1K_duIgLXMqtkozfs9PifA",
            authDomain: "reevox-gamehub.firebaseapp.com",
            databaseURL: "https://reevox-gamehub-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "reevox-gamehub",
            storageBucket: "reevox-gamehub.firebasestorage.app",
            messagingSenderId: "977802762477",
            appId: "1:977802762477:web:edac4a5eb4cd92fa6694e4"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let currentUser = localStorage.getItem('reevox_user');
        let currentUserKey = null;
        let audio = document.getElementById('audioPlayer');
        let currentTrack = null;
        let queue = [];
        let currentIndex = 0;
        let isPlaying = false;
        let isRepeat = false;
        let isShuffle = false;
        let currentPlaylistId = null;

        if (!currentUser) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('userDisplay').textContent = currentUser;
            loadTracks();
            loadPlaylists();
            initPlayer();
            loadPlayerState();
        }

        // INIT PLAYER
        function initPlayer() {
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', handleTrackEnd);
            audio.addEventListener('loadedmetadata', () => {
                document.getElementById('duration').textContent = formatTime(audio.duration);
            });
            
            // Volume par défaut
            audio.volume = 0.7;
        }

        // SAUVEGARDER L'ÉTAT DU PLAYER
        function savePlayerState() {
            if (currentTrack) {
                localStorage.setItem('reevox_music_track', JSON.stringify(currentTrack));
                localStorage.setItem('reevox_music_time', audio.currentTime);
                localStorage.setItem('reevox_music_queue', JSON.stringify(queue));
                localStorage.setItem('reevox_music_index', currentIndex);
            }
        }

        // CHARGER L'ÉTAT DU PLAYER
        function loadPlayerState() {
            const savedTrack = localStorage.getItem('reevox_music_track');
            const savedTime = localStorage.getItem('reevox_music_time');
            const savedQueue = localStorage.getItem('reevox_music_queue');
            const savedIndex = localStorage.getItem('reevox_music_index');

            if (savedTrack) {
                currentTrack = JSON.parse(savedTrack);
                if (savedQueue) queue = JSON.parse(savedQueue);
                if (savedIndex) currentIndex = parseInt(savedIndex);
                
                loadTrack(currentTrack);
                if (savedTime) audio.currentTime = parseFloat(savedTime);
                
                document.getElementById('musicPlayer').classList.remove('hidden');
            }
        }

        // CHARGER MUSIQUES
        async function loadTracks() {
            onValue(ref(database, 'music/tracks'), (snapshot) => {
                const tracks = [];
                snapshot.forEach((child) => {
                    tracks.push({ id: child.key, ...child.val() });
                });
                
                displayTracks(tracks);
            });
        }

        function displayTracks(tracks) {
            const container = document.getElementById('tracksContainer');
            const myTracks = document.getElementById('myTracks');
            
            const allTracks = tracks.sort((a, b) => (b.plays || 0) - (a.plays || 0));
            const userTracks = tracks.filter(t => t.uploadedBy === currentUser);
            
            container.innerHTML = allTracks.map(track => createTrackCard(track)).join('');
            myTracks.innerHTML = userTracks.length > 0 
                ? userTracks.map(track => createTrackCard(track, true)).join('')
                : '<p class="text-center text-purple-300 col-span-full py-20">Aucune musique uploadée</p>';
        }

        function createTrackCard(track, showDelete = false) {
            return `
                <div class="track-card glass-music rounded-2xl overflow-hidden">
                    <div class="relative group cursor-pointer" onclick="playTrack('${track.id}')">
                        <img src="${track.cover || 'https://via.placeholder.com/300/a855f7/ffffff?text=♪'}" class="w-full h-48 object-cover">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                            <div class="bg-purple-500 rounded-full p-4">
                                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </div>
                        </div>
                        <div class="absolute bottom-2 right-2 bg-black/80 px-2 py-1 rounded text-xs">
                            ▶ ${track.plays || 0}
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold mb-1 truncate">${track.title}</h4>
                        <p class="text-sm text-purple-300 truncate">${track.artist}</p>
                        <p class="text-xs text-purple-400 mt-2">Par ${track.uploadedBy}</p>
                        <div class="flex gap-2 mt-3">
                            <button onclick="addToQueue('${track.id}')" class="flex-1 glass-music px-3 py-2 rounded-lg text-xs hover:bg-purple-500/20">
                                + Queue
                            </button>
                            <button onclick="addToPlaylist('${track.id}')" class="flex-1 glass-music px-3 py-2 rounded-lg text-xs hover:bg-purple-500/20">
                                📚 Playlist
                            </button>
                            ${showDelete ? `<button onclick="deleteTrack('${track.id}')" class="glass-music px-3 py-2 rounded-lg text-xs hover:bg-red-500/20">🗑️</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // JOUER UNE MUSIQUE
        window.playTrack = async function(trackId) {
            const snapshot = await get(ref(database, `music/tracks/${trackId}`));
            const track = { id: trackId, ...snapshot.val() };
            
            currentTrack = track;
            queue = [track];
            currentIndex = 0;
            
            loadTrack(track);
            audio.play();
            
            // Incrémenter les plays
            await update(ref(database, `music/tracks/${trackId}`), {
                plays: (track.plays || 0) + 1
            });
        };

        function loadTrack(track) {
            audio.src = track.url;
            document.getElementById('playerTitle').textContent = track.title;
            document.getElementById('playerArtist').textContent = track.artist;
            document.getElementById('playerCover').src = track.cover || 'https://via.placeholder.com/150/a855f7/ffffff?text=♪';
            document.getElementById('musicPlayer').classList.remove('hidden');
            
            document.title = `${track.title} - ${track.artist} | Reevox Music`;
            
            savePlayerState();
        }

        // CONTRÔLES
        window.togglePlay = function() {
            if (!currentTrack) return;
            
            if (audio.paused) {
                audio.play();
                document.getElementById('playBtn').textContent = '⏸️';
                isPlaying = true;
            } else {
                audio.pause();
                document.getElementById('playBtn').textContent = '▶️';
                isPlaying = false;
            }
        };

        window.previousTrack = function() {
            if (currentIndex > 0) {
                currentIndex--;
                loadTrack(queue[currentIndex]);
                audio.play();
            }
        };

        window.nextTrack = function() {
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * queue.length);
            } else if (currentIndex < queue.length - 1) {
                currentIndex++;
            } else if (isRepeat) {
                currentIndex = 0;
            } else {
                return;
            }
            
            loadTrack(queue[currentIndex]);
            audio.play();
        };

        function handleTrackEnd() {
            if (isRepeat && queue.length === 1) {
                audio.currentTime = 0;
                audio.play();
            } else {
                nextTrack();
            }
        }

        window.toggleRepeat = function() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').style.color = isRepeat ? '#a855f7' : '#d8b4fe';
        };

        window.toggleShuffle = function() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').style.color = isShuffle ? '#a855f7' : '#d8b4fe';
        };

        window.changeVolume = function() {
            const volume = document.getElementById('volumeSlider').value / 100;
            audio.volume = volume;
        };

        window.toggleMute = function() {
            if (audio.muted) {
                audio.muted = false;
                document.getElementById('muteBtn').textContent = '🔊';
            } else {
                audio.muted = true;
                document.getElementById('muteBtn').textContent = '🔇';
            }
        };

        function updateProgress() {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
            
            // Sauvegarder toutes les 5 secondes
            if (Math.floor(audio.currentTime) % 5 === 0) {
                savePlayerState();
            }
        }

        window.seekTo = function(event) {
            const progressBar = event.currentTarget;
            const clickX = event.offsetX;
            const width = progressBar.offsetWidth;
            const percentage = clickX / width;
            audio.currentTime = audio.duration * percentage;
        };

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // QUEUE
        window.addToQueue = async function(trackId) {
            const snapshot = await get(ref(database, `music/tracks/${trackId}`));
            const track = { id: trackId, ...snapshot.val() };
            queue.push(track);
            document.getElementById('queueCount').textContent = queue.length;
            savePlayerState();
            alert('✅ Ajouté à la queue !');
        };

        window.openQueue = function() {
            document.getElementById('queueList').innerHTML = queue.map((track, i) => `
                <div class="flex items-center gap-3 glass-music rounded-xl p-3 ${i === currentIndex ? 'border-2 border-purple-500' : ''}">
                    <img src="${track.cover || 'https://via.placeholder.com/50/a855f7/ffffff?text=♪'}" class="w-12 h-12 rounded">
                    <div class="flex-1">
                        <p class="font-bold text-sm">${track.title}</p>
                        <p class="text-xs text-purple-300">${track.artist}</p>
                    </div>
                    ${i === currentIndex ? '<span class="text-purple-500">▶</span>' : ''}
                    <button onclick="removeFromQueue(${i})" class="text-red-400 hover:text-red-300">✕</button>
                </div>
            `).join('');
            document.getElementById('queueModal').classList.remove('hidden');
        };

        window.closeQueue = () => document.getElementById('queueModal').classList.add('hidden');

        window.removeFromQueue = function(index) {
            queue.splice(index, 1);
            if (currentIndex >= index && currentIndex > 0) currentIndex--;
            document.getElementById('queueCount').textContent = queue.length;
            savePlayerState();
            openQueue();
        };

        // UPLOAD
        window.openUploadModal = () => document.getElementById('uploadModal').classList.remove('hidden');
        window.closeUploadModal = () => document.getElementById('uploadModal').classList.add('hidden');

        window.uploadTrack = async function() {
            const title = document.getElementById('trackTitle').value.trim();
            const artist = document.getElementById('trackArtist').value.trim();
            const url = document.getElementById('trackURL').value.trim();
            const cover = document.getElementById('trackCover').value.trim();

            if (!title || !artist || !url) {
                alert('⚠️ Remplis tous les champs obligatoires !');
                return;
            }

            try {
                await push(ref(database, 'music/tracks'), {
                    title,
                    artist,
                    url,
                    cover: cover || 'https://via.placeholder.com/300/a855f7/ffffff?text=♪',
                    uploadedBy: currentUser,
                    uploadedAt: Date.now(),
                    plays: 0
                });

                alert('✅ Musique uploadée !');
                closeUploadModal();
                document.getElementById('trackTitle').value = '';
                document.getElementById('trackArtist').value = '';
                document.getElementById('trackURL').value = '';
                document.getElementById('trackCover').value = '';
            } catch (e) {
                alert('❌ Erreur: ' + e.message);
            }
        };

        window.deleteTrack = async function(trackId) {
            if (!confirm('Supprimer cette musique ?')) return;
            await remove(ref(database, `music/tracks/${trackId}`));
            alert('✅ Musique supprimée !');
        };

        // PLAYLISTS
        async function loadPlaylists() {
            onValue(ref(database, 'music/playlists'), (snapshot) => {
                const playlists = [];
                snapshot.forEach((child) => {
                    const playlist = { id: child.key, ...child.val() };
                    if (playlist.owner === currentUser) {
                        playlists.push(playlist);
                    }
                });
                
                displayPlaylists(playlists);
            });
        }

        function displayPlaylists(playlists) {
            const container = document.getElementById('myPlaylists');
            container.innerHTML = playlists.length > 0
                ? playlists.map(p => `
                    <div class="glass-music rounded-2xl p-6 cursor-pointer hover:scale-105 transition-all" onclick="openPlaylist('${p.id}')">
                        <div class="text-6xl mb-4 text-center">📚</div>
                        <h3 class="font-bold text-lg mb-2">${p.name}</h3>
                        <p class="text-sm text-purple-300">${p.tracks?.length || 0} musiques</p>
                    </div>
                `).join('')
                : '<p class="text-center text-purple-300 col-span-full py-20">Aucune playlist</p>';
        }

        window.createPlaylist = async function() {
            const name = prompt('Nom de la playlist :');
            if (!name) return;

            await push(ref(database, 'music/playlists'), {
                name,
                owner: currentUser,
                tracks: [],
                createdAt: Date.now()
            });

            alert('✅ Playlist créée !');
        };

        window.addToPlaylist = async function(trackId) {
            const snapshot = await get(ref(database, 'music/playlists'));
            const playlists = [];
            
            snapshot.forEach((child) => {
                const p = child.val();
                if (p.owner === currentUser) {
                    playlists.push({ id: child.key, ...p });
                }
            });

            if (playlists.length === 0) {
                alert('Crée d\'abord une playlist !');
                return;
            }

            const choice = prompt(`Choisis une playlist:\n${playlists.map((p, i) => `${i + 1}. ${p.name}`).join('\n')}`);
            const index = parseInt(choice) - 1;

            if (index >= 0 && index < playlists.length) {
                const playlist = playlists[index];
                const tracks = playlist.tracks || [];
                tracks.push(trackId);
                
                await update(ref(database, `music/playlists/${playlist.id}`), { tracks });
                alert('✅ Ajouté à la playlist !');
            }
        };

        window.openPlaylist = async function(playlistId) {
            currentPlaylistId = playlistId;
            const snapshot = await get(ref(database, `music/playlists/${playlistId}`));
            const playlist = snapshot.val();

            document.getElementById('playlistModalTitle').textContent = playlist.name;
            document.getElementById('playlistModalCount').textContent = `${playlist.tracks?.length || 0} musiques`;

            if (playlist.tracks && playlist.tracks.length > 0) {
                const tracksData = await Promise.all(
                    playlist.tracks.map(async (tid) => {
                        const s = await get(ref(database, `music/tracks/${tid}`));
                        return s.exists() ? { id: tid, ...s.val() } : null;
                    })
                );

                const validTracks = tracksData.filter(t => t !== null);
                document.getElementById('playlistTracks').innerHTML = validTracks.map(track => `
                    <div class="flex items-center gap-3 glass-music rounded-xl p-3">
                        <img src="${track.cover || 'https://via.placeholder.com/50/a855f7/ffffff?text=♪'}" class="w-12 h-12 rounded">
                        <div class="flex-1">
                            <p class="font-bold text-sm">${track.title}</p>
                            <p class="text-xs text-purple-300">${track.artist}</p>
                        </div>
                        <button onclick="playTrack('${track.id}')" class="bg-purple-500 px-3 py-1 rounded text-sm">▶️</button>
                    </div>
                `).join('');
            } else {
                document.getElementById('playlistTracks').innerHTML = '<p class="text-center text-purple-300 py-10">Playlist vide</p>';
            }

            document.getElementById('playlistModal').classList.remove('hidden');
        };

        window.closePlaylistModal = () => document.getElementById('playlistModal').classList.add('hidden');

        window.playPlaylist = async function() {
            const snapshot = await get(ref(database, `music/playlists/${currentPlaylistId}`));
            const playlist = snapshot.val();

            if (!playlist.tracks || playlist.tracks.length === 0) {
                alert('Playlist vide !');
                return;
            }

            const tracksData = await Promise.all(
                playlist.tracks.map(async (tid) => {
                    const s = await get(ref(database, `music/tracks/${tid}`));
                    return s.exists() ? { id: tid, ...s.val() } : null;
                })
            );

            queue = tracksData.filter(t => t !== null);
            currentIndex = 0;
            
            if (queue.length > 0) {
                loadTrack(queue[0]);
                audio.play();
                closePlaylistModal();
            }
        };

        // TABS
        window.showTab = function(tab) {
            ['discover', 'playlists', 'library'].forEach(t => {
                document.getElementById(`${t}Tab`).classList.add('hidden');
                document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).className = 'px-6 py-3 rounded-xl font-bold glass-music hover:bg-purple-500/20';
            });

            document.getElementById(`${tab}Tab`).classList.remove('hidden');
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).className = 'px-6 py-3 rounded-xl font-bold bg-gradient-to-r from-purple-600 to-pink-600';
        };

        // Sauvegarder avant de quitter
        window.addEventListener('beforeunload', savePlayerState);
    </script>

    <script>
        (function() {
            const user = localStorage.getItem('reevox_user');
            const expiry = localStorage.getItem('reevox_subscription_expiry');
            if (!user || !expiry || parseInt(expiry) < Date.now()) {
                window.location.href = 'paiement.html';
            }
        })();
    </script>

</body>
</html>
