<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Zombattack - Reevox</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #39ff14;
            --accent-glow: rgba(57, 255, 20, 0.5);
            --dark: #000814;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            font-family: 'Rajdhani', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(40%) saturate(1.2) hue-rotate(5deg);
            transform: scale(1.05);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1.05); }
            to   { transform: scale(1.13); }
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 25%,
                rgba(0,8,20,0.5) 65%,
                var(--dark) 100%
            );
            pointer-events: none;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(57,255,20,0.02) 2px,
                rgba(57,255,20,0.02) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .hero-content {
            position: absolute;
            bottom: 12%;
            left: 6%;
            z-index: 2;
            max-width: 600px;
        }

        .game-tag {
            display: inline-block;
            background: var(--accent);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            padding: 4px 14px;
            border-radius: 2px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .game-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 10vw, 8rem);
            line-height: 0.9;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 60px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.8);
            color: white;
            margin-bottom: 20px;
            animation: titleReveal 1s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes titleReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .game-desc {
            font-size: 15px;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 420px;
            animation: titleReveal 1s 0.2s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            animation: titleReveal 1s 0.4s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.1);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        .btn:hover::before { transform: translateX(0); }

        .btn-play {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 30px var(--accent-glow);
        }
        .btn-play:hover {
            box-shadow: 0 6px 40px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-trailer {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1.5px solid rgba(57,255,20,0.4);
            backdrop-filter: blur(10px);
        }
        .btn-trailer:hover {
            background: rgba(57,255,20,0.1);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .stats {
            position: absolute;
            bottom: 12%;
            right: 6%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: right;
            animation: titleReveal 1s 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .stat-item { display: flex; flex-direction: column; }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: var(--accent);
            line-height: 1;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .stat-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
        }

        #trailerModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }
        #trailerModal.open { display: flex; }

        .modal-inner {
            position: relative;
            width: 90%;
            max-width: 960px;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.92); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal-inner::before, .modal-inner::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--accent);
            border-style: solid;
            z-index: 2;
        }
        .modal-inner::before { top: -6px; left: -6px; border-width: 3px 0 0 3px; }
        .modal-inner::after  { bottom: -6px; right: -6px; border-width: 0 3px 3px 0; }

        .video-wrapper {
            border: 1px solid rgba(57,255,20,0.3);
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 60px rgba(57,255,20,0.15), 0 30px 80px rgba(0,0,0,0.8);
        }

        #trailerVideo { width: 100%; display: block; border-radius: 6px; }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .close-btn {
            position: absolute;
            top: -50px; right: 0;
            background: none; border: none;
            color: white; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            opacity: 0.6; transition: opacity 0.2s;
        }
        .close-btn:hover { opacity: 1; }

        .modal-backdrop { position: absolute; inset: 0; z-index: -1; }

        .scroll-hint {
            position: absolute;
            bottom: 3%; left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex; flex-direction: column;
            align-items: center; gap: 6px;
            opacity: 0.35;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(6px); }
        }

        .scroll-hint span { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

        @media (max-width: 640px) {
            .stats { display: none; }
            .hero-content { left: 4%; right: 4%; bottom: 15%; }
        }
    </style>
</head>
<body>

<div class="hero">
    <img src="Capture d’écran 2026-02-16 111511.png" class="hero-img" alt="Zombattack">

    <div class="hero-content">
        <span class="game-tag">🧟 Survival</span>
        <h1 class="game-title">Zombattack</h1>
        <p class="game-desc">
            Les morts se lèvent. Toi, tu restes debout.<br>
            Survie vague après vague.
        </p>
        <div class="btn-group">
            <button class="btn btn-play" onclick="location.href='page3.html'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Jouer maintenant
            </button>
            <button class="btn btn-trailer" onclick="openTrailer()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                Voir le trailer
            </button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <span class="stat-value">20 MIN</span>
            <span class="stat-label">Durée moyenne</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">PC</span>
            <span class="stat-label">Plateforme</span>
        </div>
        <div class="stat-item">
            <span class="stat-value">∞</span>
            <span class="stat-label">Rejouabilité</span>
        </div>
    </div>

    <div class="scroll-hint">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        <span>Scroll</span>
    </div>
</div>

<div id="trailerModal">
    <div class="modal-backdrop" onclick="closeTrailer()"></div>
    <div class="modal-inner">
        <button class="close-btn" onclick="closeTrailer()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            Fermer
        </button>
        <p class="modal-title">🎬 Trailer — Zombattack</p>
        <div class="video-wrapper">
            <video id="trailerVideo" controls controlsList="nodownload">
                <source src="Enregistrement 2026-02-16 111315.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<script>
    function openTrailer() {
        const modal = document.getElementById("trailerModal");
        modal.classList.add("open");
        modal.style.display = "flex";
        document.getElementById("trailerVideo").play();
        document.body.style.overflow = "hidden";
    }

    function closeTrailer() {
        const modal = document.getElementById("trailerModal");
        modal.style.display = "none";
        modal.classList.remove("open");
        const video = document.getElementById("trailerVideo");
        video.pause();
        video.currentTime = 0;
        document.body.style.overflow = "";
    }

    document.addEventListener("keydown", e => {
        if (e.key === "Escape") closeTrailer();
    });
</script>


<script>
    (function() {
        const user   = localStorage.getItem('reevox_user');
        const expiry = localStorage.getItem('reevox_subscription_expiry');
        if (!user || !expiry || parseInt(expiry) < Date.now()) {
            window.location.href = 'paiement.html';
        }
    })();
</script>


<script src="reevox-mini-player.js"></script>

</body>
</html>
